# 個人情報チェッカー設定ファイル
# このファイルを編集して、チェック動作をカスタマイズできます

# チェック対象のエンティティ（true=有効, false=無効）
[entities]
check_my_number = true              # マイナンバー
check_phone_number = true           # 電話番号
check_address = true                # 住所
check_person_name = true            # 氏名
check_credit_card = true            # クレジットカード番号
check_email = true                  # メールアドレス
check_ssn = true                    # 社会保障番号

# 除外するディレクトリ（カンマ区切り）
[exclusions]
directories = __pycache__, node_modules, .git, .svn, build, dist, obj, bin, Debug, Release, .vs

# 除外するファイルパターン（カンマ区切り、ワイルドカード使用可）
file_patterns = *.pyc, *.exe, *.dll, *.so, *.o, *.obj, *.lib, *.a

# 最小信頼度スコア（0.0〜1.0、この値以上の検出結果のみレポートに含める）
[thresholds]
min_score = 0.5

# カスタムパターン（追加でチェックしたいパターン）
# 形式: パターン名 = 正規表現パターン
[custom_patterns]
# 例: 社員番号パターン
# employee_id = EMP\d{6}
# 例: プロジェクトコード
# project_code = PRJ-[A-Z]{3}-\d{4}

# 既知のテストデータ（これらが見つかった場合に警告）
[known_test_data]
test_names = 山田太郎, 山田花子, 田中太郎, 佐藤一郎, 鈴木次郎, テスト太郎, サンプル花子
test_emails = test@example.com, sample@test.co.jp, dummy@example.org
test_phones = 090-1234-5678, 03-1234-5678, 0120-123-456

# レポート設定
[report]
output_file = pii_check_report.txt
include_context = true              # コンテキスト（前後の文字列）を含める
context_length = 30                 # コンテキストの長さ（文字数）
group_by_file = true               # ファイルごとにグループ化
show_line_numbers = true           # 行番号を表示
